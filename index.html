<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="src/assets/img/favicon.ico" type="image/x-icon">
  <title>TecLevel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="src/css/style.css"/>
</head>
<body>

  <!-- TELA DE AUTENTICAÇÃO -->
  <div id="auth-view">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">T</div>
        <div class="auth-logo-text">TecLevel</div>
      </div>
      <div class="auth-title">Crie sua conta</div>
      <div class="auth-sub">Comece sua jornada de aprendizado</div>
      <div class="field">
        <label>Nome Completo</label>
        <input id="reg-name" type="text" placeholder="Seu nome completo"/>
      </div>
      <div class="field">
        <label>Login</label>
        <input id="reg-login" type="text" placeholder="Escolha um login"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input id="reg-pass" type="password" placeholder="Crie uma senha"/>
      </div>
      <button class="btn-primary" onclick="register()">Cadastrar e Entrar →</button>
      <p id="auth-err" style="color:#EF4444;font-size:13px;margin-top:12px;text-align:center;display:none"></p>
    </div>
  </div>

  <!-- TELA PRINCIPAL DO APP -->
  <div id="app-view">

    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">T</div>
          <div class="sidebar-logo-text">TecLevel</div>
        </div>
        <button class="sidebar-close" onclick="closeSidebar()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-user">
        <div class="sidebar-user-name" id="sb-name">Usuário</div>
        <div class="sidebar-user-xp" id="sb-xp">0 XP · Iniciante</div>
      </div>
      <div class="sidebar-xp-bar">
        <div class="sidebar-xp-fill" id="sb-xp-bar" style="width:0%"></div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section-label">Menu</div>
        <div class="nav-item active" onclick="showView('home')">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
          Início
        </div>
        <div class="nav-item" onclick="showView('learn')">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Resumos
        </div>
        <div class="nav-item" onclick="showView('exercises')">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4l3 3"/>
          </svg>
          Exercícios
        </div>
        <div class="nav-section-label">Conta</div>
        <div class="nav-item danger" onclick="logout()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair
        </div>
      </div>
    </nav>

    <header class="topbar">
      <button class="topbar-hamburger" onclick="toggleSidebar()">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-title" id="topbar-title">Início</div>
      <div class="topbar-xp">⚡ <span id="topbar-xp">0</span> XP</div>
    </header>

    <main class="main">
      <div class="content">

        <div class="view active" id="view-home">
          <div class="home-greeting" id="home-greeting">Olá! 👋</div>
          <div class="home-sub">Continue sua jornada de aprendizado hoje.</div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-card-label">XP Total</div>
              <div class="stat-card-value xp" id="home-xp">0</div>
              <div class="xp-progress-wrap">
                <div class="xp-progress-label">
                  <span>Nível <span id="home-level">1</span></span>
                  <span id="home-xp-next">100 XP próx.</span>
                </div>
                <div class="xp-bar">
                  <div class="xp-bar-fill" id="home-xp-bar" style="width:0%"></div>
                </div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-label">Streak 🔥</div>
              <div class="stat-card-value streak" id="home-streak">1</div>
              <div style="font-size:12px;color:var(--muted);margin-top:4px">dias seguidos</div>
            </div>
            <div class="stat-card">
              <div class="stat-card-label">Aulas Feitas</div>
              <div class="stat-card-value" id="home-lessons">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-card-label">Exercícios</div>
              <div class="stat-card-value" id="home-exercises">0</div>
            </div>
          </div>
          <div class="section-title">📚 Matérias</div>
          <div class="materias-grid" id="materias-home"></div>
        </div>

        <div class="view" id="view-learn">
          <div class="breadcrumb" id="learn-breadcrumb"></div>
          <div id="learn-content"></div>
        </div>

        <div class="view" id="view-exercises">
          <div class="breadcrumb" id="ex-breadcrumb"></div>
          <div id="ex-content"></div>
        </div>

      </div>
    </main>
  </div>

  <div id="xp-toast"></div>

  <!-- ═══════════════════════════════════════════════════
       SCRIPTS — carregue SEMPRE nesta ordem:
       1. Conteúdos (textos e vídeos de cada matéria)
       2. Questões (quizzes de cada matéria)
       3. data/index.js (combina conteúdo + questões → DATA)
       4. app.js (lógica principal que usa DATA)
  ═══════════════════════════════════════════════════ -->

  <!-- 1. Conteúdos -->
  <script src="src/js/conteudo/geografia.js"></script>
  <script src="src/js/conteudo/portugues.js"></script>
  <script src="src/js/conteudo/matematica.js"></script>
  <script src="src/js/conteudo/ciencias.js"></script>
  <script src="src/js/conteudo/historia.js"></script>

  <!-- 2. Questões -->
  <script src="src/js/questoes/geografia.js"></script>
  <script src="src/js/questoes/portugues.js"></script>
  <script src="src/js/questoes/matematica.js"></script>
  <script src="src/js/questoes/ciencias.js"></script>
  <script src="src/js/questoes/historia.js"></script>

  <!-- 3. Combina tudo no array DATA -->
  <script src="src/js/index.js"></script>

  <!-- 4. Lógica do app (usa DATA já montado) -->
  <script src="src/js/app.js"></script>

</body>
</html>
